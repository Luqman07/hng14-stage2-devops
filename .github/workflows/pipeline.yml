name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python code
        run: flake8 api/main.py worker/worker.py --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        run: npm install --only=production
        working-directory: frontend

      - name: Lint Frontend code
        run: npx eslint@8.40.0 .
        working-directory: frontend

      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r api/requirements.txt pytest pytest-cov

      - name: Run tests
        run: pytest tests --cov=. --cov-report=xml
        working-directory: api

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker buildx build --no-cache --load -t localhost:5000/api:${{ github.sha }} ./api
          docker buildx build --no-cache --load -t localhost:5000/worker:${{ github.sha }} ./worker
          docker buildx build --no-cache --load -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan images
        run: |
          for IMAGE in api worker frontend; do
            trivy image --severity CRITICAL --format sarif \
              --output trivy-${IMAGE}.sarif \
              localhost:5000/${IMAGE}:${{ github.sha }}
            trivy image --severity CRITICAL --format table --exit-code 1 \
              localhost:5000/${IMAGE}:${{ github.sha }}
          done

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-*.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v3

      - name: Create .env file
        run: |
          cat <<EOF > .env
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=testpassword
          QUEUE_NAME=jobs
          API_URL=http://api:8000
          PORT=3000
          EOF

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for stack to be healthy
        run: |
          for i in $(seq 1 30); do
            UNHEALTHY=$(docker compose ps --format json | python3 -c "
          import sys, json
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          print(sum(1 for s in services if s.get('Health','') not in ('healthy','')))
          ")
            [ "$UNHEALTHY" = "0" ] && echo "All healthy" && break
            echo "Waiting... ($i/30)"
            sleep 5
          done

      - name: Submit job and poll for completion
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:3000/submit | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Submitted job: $JOB_ID"
          for i in $(seq 1 20); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            [ "$STATUS" = "completed" ] && exit 0
            sleep 3
          done
          echo "Job did not complete in time" && exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Create .env file
        run: |
          cat <<EOF > .env
          REDIS_HOST={{ secrets.REDIS_HOST }}
          REDIS_PORT={{ secrets.REDIS_PORT }}
          REDIS_PASSWORD={{ secrets.REDIS_PASSWORD }}
          QUEUE_NAME={{ secrets.QUEUE_NAME }}
          API_URL={{ secrets.API_URL }}
          PORT={{ env.PORT }}
          EOF

      - name: Rolling update
        run: |
          set -e
          for SERVICE in api worker frontend; do
            docker compose build $SERVICE
            docker compose up -d --no-deps $SERVICE
            for i in $(seq 1 12); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $SERVICE 2>/dev/null || echo "none")
              if [ "$HEALTH" = "healthy" ]; then echo "$SERVICE healthy"; break; fi
              if [ $i -eq 12 ]; then
                echo "$SERVICE failed health check — aborting rollout"
                exit 1
              fi
              sleep 5
            done
          done
